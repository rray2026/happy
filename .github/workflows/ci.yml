name: CI

on:
    workflow_dispatch:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    verify:
        name: Typecheck + Test
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Typecheck (all packages)
              run: pnpm -r typecheck

            - name: Test (all packages)
              run: pnpm -r test
