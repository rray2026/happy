name: CLI Smoke Test

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/happy-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'packages/happy-cli/**'
      - '.github/workflows/cli-smoke-test.yml'
  workflow_dispatch:

jobs:
  smoke-test-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --filter happy...

    - name: Build package
      run: pnpm --filter happy build

    - name: Pack package
      run: pnpm --filter happy pack --pack-destination packages/happy-cli

    - name: Install packed package globally
      run: |
        PACKAGE_FILE=$(ls packages/happy-cli/*.tgz)
        npm install -g "./$PACKAGE_FILE"

    - name: Test binary execution
      run: |
        # No-arg invocation prints usage and exits 0
        echo "Testing happy (no args)..."
        happy
        echo "Smoke test passed on Linux!"

  smoke-test-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [20, 24]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --filter happy...

    - name: Build package
      run: pnpm --filter happy build

    - name: Pack package
      run: pnpm --filter happy pack --pack-destination packages/happy-cli

    - name: Install packed package globally
      shell: cmd
      run: |
        for %%f in (packages\happy-cli\*.tgz) do npm install -g "%%f"

    - name: Test binary execution
      shell: cmd
      run: |
        for /f "tokens=*" %%i in ('npm config get prefix') do set NPM_PREFIX=%%i
        set PATH=%NPM_PREFIX%;%PATH%

        echo Testing happy (no args)...
        if exist "%NPM_PREFIX%\happy.cmd" (
          "%NPM_PREFIX%\happy.cmd"
        ) else (
          happy
        )
        if errorlevel 1 (
          echo Error: happy exited with error
          exit /b 1
        )

        echo Smoke test passed on Windows!

# We don't need a smoke test for macOS because most contributors are developing on macOS.
