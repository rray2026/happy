name: Pack CLI

on:
    workflow_dispatch:
    push:
        branches: [main]
        paths:
            - 'packages/happy-cli/**'

jobs:
    pack:
        name: Build & Pack happy-cli
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --filter happy...

            - name: Build
              run: pnpm --filter happy build

            - name: Pack
              run: pnpm --filter happy pack --pack-destination /tmp/happy-pack

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: happy-cli
                  path: /tmp/happy-pack/*.tgz
                  retention-days: 7
