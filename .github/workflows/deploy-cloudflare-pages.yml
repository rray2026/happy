name: Deploy to Cloudflare Pages

on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Deployment environment'
                required: true
                default: production
                type: choice
                options:
                    - production
                    - preview
                    - development
    push:
        branches: [main, 'claude/*']
        paths:
            - 'packages/cowork-webapp/**'

# Only one deploy runs at a time per target environment; new runs cancel older pending ones.
concurrency:
    group: >-
        deploy-cloudflare-pages-${{
          github.event_name == 'workflow_dispatch' && github.event.inputs.environment ||
          github.ref_name == 'main' && 'production' ||
          'development'
        }}
    cancel-in-progress: true

jobs:
    deploy:
        name: >-
            Build & Deploy (${{
              github.event_name == 'workflow_dispatch' && github.event.inputs.environment ||
              github.ref_name == 'main' && 'production' ||
              'development'
            }})
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Determine environment
              id: env
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    echo "name=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
                  elif [ "${{ github.ref_name }}" = "main" ]; then
                    echo "name=production" >> "$GITHUB_OUTPUT"
                  else
                    echo "name=development" >> "$GITHUB_OUTPUT"
                  fi

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              working-directory: packages/cowork-webapp
              run: pnpm build

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  workingDirectory: packages/cowork-webapp
                  packageManager: pnpm
                  command: >
                      pages deploy dist
                      --project-name=${{ vars.CF_PAGES_PROJECT_NAME }}
                      --branch=${{ steps.env.outputs.name == 'production' && 'main' || steps.env.outputs.name }}
                      --commit-dirty=true
