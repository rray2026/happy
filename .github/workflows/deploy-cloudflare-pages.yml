name: Deploy to Cloudflare Pages

on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Deployment environment'
                required: true
                default: production
                type: choice
                options:
                    - production
                    - preview
                    - development
    push:
        branches: [main]
        paths:
            - 'packages/cowork-webapp/**'

# Only one deploy runs at a time; new runs cancel older pending ones.
concurrency:
    group: deploy-cloudflare-pages-${{ github.event.inputs.environment || 'production' }}
    cancel-in-progress: true

jobs:
    deploy:
        name: Build & Deploy (${{ github.event.inputs.environment || 'production' }})
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              working-directory: packages/cowork-webapp
              run: pnpm build

            - name: Deploy to Cloudflare Pages
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: >
                      pages deploy packages/cowork-webapp/dist
                      --project-name=${{ vars.CF_PAGES_PROJECT_NAME }}
                      --branch=${{ (github.event.inputs.environment || 'production') == 'production' && 'main' || (github.event.inputs.environment || 'production') }}
                      --commit-dirty=true
